name: Generate Snake Animation

on:
  schedule: # Her gece otomatik çalışır
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # v3 yerine v4 kullan

      - name: Generate Snake SVG
        uses: Platane/snk@v3.2.0
        with:
          github_user_name: kaanaltay-hub
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push generated snake to the output branch
        uses: crazy-max/ghaction-github-pages@v4   # v3.1.0 yerine v4 kullan
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
